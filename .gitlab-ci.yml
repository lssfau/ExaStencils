##                                   ##
##         Tests                     ##
##                                   ##
#######################################


###############################################
# MATRIX TESTS                                #
###############################################

test:MatrixMisc:
    extends: .test_template
    script:
        # Matrix_evalMatrixOpRuntimeExecution: decision about runtime execution of solution of local systems and inversions depending on size/const entries
        - run-exastencils-test Matrix_evalMatrixOpRuntimeExecution MatrixClassTests/evalMOpRuntimeExe evalMOpRuntimeExe.knowledge "evalMOpRuntimeExe.exa4" evalMOpRuntimeExe.RESULTS Platform/random.platform output
        # Matrix_determineMatrixStructures: classification of matrix shapes/structures
        - run-exastencils-test Matrix_determineMatrixStructures MatrixClassTests/determineMatrixStructures determineMatrixStructures.knowledge "determineMatrixStructures.exa4" determineMatrixStructures.RESULTS Platform/random.platform output
        # Matrix_matrixFields: operations on fields with matrices as inner data type
        - run-exastencils-test Matrix_matrixFields MatrixClassTests/matrixFields matrixFields.knowledge "matrixFields.exa4" matrixFields.RESULTS Platform/random.platform output
        # Matrix_2D_FV_SWE: shallow water equation in vector form
        - run-exastencils-test Matrix_2D_FV_SWE MatrixClassTests/2D_FV_SWE 2D_FV_SWE.knowledge "2D_FV_SWE.exa4" 2D_FV_SWE.RESULTS Platform/random.platform output

# built-in operations of matrices
test:MatrixOperations:
    extends: .test_template
    script:
        # Matrix_slicing
        - run-exastencils-test Matrix_slicing MatrixClassTests/resolvingMatrixFunctions/slicing slicing.knowledge "slicing.exa4" slicing.RESULTS Platform/random.platform output
        # Matrix_chaines
        - run-exastencils-test Matrix_chaines MatrixClassTests/resolvingMatrixFunctions/chaines chaines.knowledge "chaines.exa4" chaines.RESULTS Platform/random.platform output
        # Matrix_cross
        - run-exastencils-test Matrix_cross MatrixClassTests/resolvingMatrixFunctions/cross cross.knowledge "cross.exa4" cross.RESULTS Platform/random.platform output
        # Matrix_dot
        - run-exastencils-test Matrix_dot MatrixClassTests/resolvingMatrixFunctions/dot dot.knowledge "dot.exa4" dot.RESULTS Platform/random.platform output
        # Matrix_trace
        - run-exastencils-test Matrix_trace MatrixClassTests/resolvingMatrixFunctions/trace trace.knowledge "trace.exa4" trace.RESULTS Platform/random.platform output
        # Matrix_transpose
        - run-exastencils-test Matrix_transpose MatrixClassTests/resolvingMatrixFunctions/transpose transpose.knowledge "transpose.exa4" transpose.RESULTS Platform/random.platform output
        # Matrix_frobeniusNorm
        - run-exastencils-test Matrix_frobeniusNorm MatrixClassTests/resolvingMatrixFunctions/frobeniusNorm frobeniusNorm.knowledge "frobeniusNorm.exa4" frobeniusNorm.RESULTS Platform/random.platform output

# direct solution of small linear systems
