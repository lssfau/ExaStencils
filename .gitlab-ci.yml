test:CUDA_2D_MatrixReduction:
    extends: .test_template_CUDA
    script:
        # base variant
        - run-exastencils-test CUDA_2D_MatrixReduction CUDA 2D_MatrixReduction.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output
        # managed memory variant
        - cp CUDA/2D_MatrixReduction.knowledge CUDA/2D_MatrixReduction_MM.knowledge
        - echo -e "\ncuda_useManagedMemory = true" >> CUDA/2D_MatrixReduction_MM.knowledge
        - echo -e "\ncuda_usePinnedHostMemory = false" >> CUDA/2D_MatrixReduction_MM.knowledge
        - run-exastencils-test CUDA_2D_MatrixReduction_MM CUDA 2D_MatrixReduction_MM.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output
        # zero copy variant
        - cp CUDA/2D_MatrixReduction.knowledge CUDA/2D_MatrixReduction_ZC.knowledge
        - echo -e "\ncuda_useZeroCopy = true" >> CUDA/2D_MatrixReduction_ZC.knowledge
        - echo -e "\ncuda_usePinnedHostMemory = false" >> CUDA/2D_MatrixReduction_ZC.knowledge
        - run-exastencils-test CUDA_2D_MatrixReduction_ZC CUDA 2D_MatrixReduction_ZC.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output
        # no stream variant
        - cp CUDA/2D_MatrixReduction.knowledge CUDA/2D_MatrixReduction_NoStream.knowledge
        - echo -e "\nexperimental_cuda_useStreams = false" >> CUDA/2D_MatrixReduction_NoStream.knowledge
        - run-exastencils-test CUDA_2D_MatrixReduction_NoStream CUDA 2D_MatrixReduction_NoStream.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output
        # managed memory && no stream variant
        - cp CUDA/2D_MatrixReduction_MM.knowledge CUDA/2D_MatrixReduction_MM_NoStream.knowledge
        - echo -e "\nexperimental_cuda_useStreams = false" >> CUDA/2D_MatrixReduction_MM_NoStream.knowledge
        - run-exastencils-test CUDA_2D_MatrixReduction_MM_NoStream CUDA 2D_MatrixReduction_MM_NoStream.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output
        # zero copy && no stream variant
        - cp CUDA/2D_MatrixReduction_ZC.knowledge CUDA/2D_MatrixReduction_ZC_NoStream.knowledge
        - echo -e "\nexperimental_cuda_useStreams = false" >> CUDA/2D_MatrixReduction_ZC_NoStream.knowledge
        - run-exastencils-test CUDA_2D_MatrixReduction_ZC_NoStream CUDA 2D_MatrixReduction_ZC_NoStream.knowledge "2D_MatrixReduction.exa4" 2D_MatrixReduction.results Platform/i10swarm-gpu.platform output


