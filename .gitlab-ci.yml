stages:
    - .pre
    - build
    - test
    - example
    - benchmark

#######################################
##                                   ##
##         Templates                 ##
##                                   ##
#######################################

.test_template:
    image: i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11
    dependencies:
        - build:generator
        - build:test-runner
    tags:
        - docker
    artifacts:
        when: on_failure
        paths:
            - Testing/output/Debug/*
            - Testing/output/generated/*
        expire_in: 1 weeks
    before_script:
        - java -version
        - python3 --version
        - mpirun --version
        - source .venv/bin/activate
        - cmake --version
        - cd Testing

.test_template_AVX:
    extends: .test_template
    tags:
        - docker
        - AVX

.test_template_AVX2:
    extends: .test_template
    tags:
        - docker
        - AVX2

.test_template_CUDA:
    extends: .test_template
    tags:
        - docker
        - cuda11
        - cudaComputeCapability6.1
    before_script:
        - java -version
        - python3 --version
        - mpirun --version
        - nvcc --version
        - nvidia-smi
        - updatedb
        - locate cuda.h
        - locate libcudart
        - export CPATH=$CPATH:/usr/local/cuda-11.4/targets/x86_64-linux/include
        - ln -s /usr/local/cuda-11.4/targets/x86_64-linux/lib/libcudart.so /usr/lib
        - source .venv/bin/activate
        - cmake --version
        - cd Testing

.test_template_IO:
    extends: .test_template
    image: i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11-par-io
    artifacts:
        when: on_failure
        paths:
            - Testing/output/Debug/*
            - Testing/output/generated/*
            - Testing/data/*
        expire_in: 1 weeks
    before_script:
        - java -version
        - python3 --version
        - mpirun --version
        - sionversion
        - h5pcc -showconfig
        - pnetcdf-config --all
        - source .venv/bin/activate
        - cmake --version
        - cd Testing


.benchmark_template:
    dependencies:
        - build:generator
        - build:test-runner
    image: i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11
    tags:
        - docker-benchmark
    artifacts:
        when: on_failure
        paths:
            - Benchmark/output/Debug/*
            - Benchmark/output/generated/*
        expire_in: 1 weeks
    before_script:
        - java -version
        - python3 --version
        - mpirun --version
        - source .venv/bin/activate
        - cmake --version
        - cd Benchmark

#######################################
##                                   ##
##         Docker image              ##
##                                   ##
#######################################

generate-docker-image-base:
    stage: .pre
    when: manual
    image: docker:latest
    tags:
        - docker-docker
    script:
        - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
        - docker pull i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11 || true
        - docker build --pull . -f  dockerfiles/ubuntu-24.04-openjdk-11.Dockerfile -t i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11
        - docker push i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11

generate-docker-image-pario:
    stage: .pre
    when: manual
    image: docker:latest
    tags:
        - docker-docker
    script:
        - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
        - docker pull i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11-par-io || true
        - docker build --pull . -f  dockerfiles/ubuntu-24.04-openjdk-11-par-io.Dockerfile -t i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11-par-io
        - docker push i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11-par-io

#######################################
##                                   ##
##         Generator                 ##
##                                   ##
#######################################

build:generator:
    stage: build
    image: i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11
    tags:
        - docker
    artifacts:
        paths:
            - Compiler/Compiler.jar
            - Compiler/lib
            - Examples
            - Benchmark
            - Testing
        expire_in: 1 weeks
    script:
        - java -version
        - sbt compile
        - sbt assembly

build:test-runner:
    stage: build
    image: i10git.cs.fau.de:5005/exastencils/exastencils/ubuntu-24.04-openjdk-11
    tags:
        - docker
    artifacts:
        paths:
            - .venv/
        expire_in: 1 weeks
    script:
        - python3 -m venv .venv
        - .venv/bin/pip install git+https://i10git.cs.fau.de/exastencils/exastencils_runner.git
        - .venv/bin/pip install cmake==3.31.6

