        # Matrix_SolveMatSysCompileTime
        - run-exastencils-test Matrix_SolveMatSysCompileTime MatrixClassTests/SolveMatSys/SolveMatSysCompileTime SolveMatSysCompileTime.knowledge "SolveMatSysCompileTime.exa4" SolveMatSysCompileTime.RESULTS Platform/random.platform output

